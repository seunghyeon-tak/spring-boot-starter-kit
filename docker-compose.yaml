services:
  # MySQL 사용시
  db:
    image: mysql:8.0
    container_name: starter-kit-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-starter_kit}
      MYSQL_USER: ${DB_USER:-user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "3307:3306"
    volumes:
      - db-data:/var/lib/mysql

  # PostgreSQL 사용시
#  db:
#    image: postgres:15
#    container_name: starter-kit-db
#    environment:
#      POSTGRES_DB: ${DB_NAME:-starter_kit}
#      POSTGRES_USER: ${DB_USER:-user}
#      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
#    ports:
#      - "5432:5432"
#    volumes:
#      - db-data:/var/lib/postgresql/data

  redis:
    image: redis:7.0
    container_name: starter-kit-redis
    ports:
      - "6380:6379"

  app:
    build: .
    platform: linux/arm64
    container_name: starter-kit-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - JWT_SECRET=${JWT_SECRET:-local-secret-key-must-be-at-least-32-characters}
    depends_on:
      - db

volumes:
  db-data: